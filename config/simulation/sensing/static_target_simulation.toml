carrier_frequency = 6e9 # 载波频率(Hz)

# 信源参数
[source]
type = "zc"
root_index = 1
normalize = true

# OFDM 参数
[ofdm]
num_symbols = 512            # 符号数
fft_size = 2048              # FFT 大小
subcarrier_spacing = 15000.0 # 子载波间隔(Hz)
cyclic_prefix_length = 512      # 循环前缀长度
l_min = 0                    # OFDM 解调器最小时延抽头索引（Sionna OFDMDemodulator）

# 信道参数
[channel]
type = "rcs"
snr_db = 10             # 信噪比(dB)

# RCS 点目标场景参数
[rcs_scene]
self_coupling_db = -10.0
rndm_phaseshift = true
self_coupling = true

[rcs_scene.target]
range_m = 95.0
velocity_mps = 5.0
rcs = 1e+25
azimuth_deg = 0.0
position_rx_m = 0.0

# 时延/多普勒窗参数
[windows.delay_window]
type = "general_hamming"
alpha = 0.7

[windows.doppler_window]
type = "general_hamming"
alpha = 0.54

# CFAR 参数
[cfar]
type = "ca"         # ca: CA-CFAR | os: OS-CFAR（二维实现见 sensing/cfar.py）
guard = 2           # 保护单元
trailing = 20       # 参考单元
pfa = 1e-4          # 虚警率
detector = "linear" # 检测器: linear | squarelaw

# MUSIC 参数
[music]
threshold = 0.1
near_range_guard_m = 1.0
