carrier_frequency = 6e9 # 载波频率(Hz)；与 GRC freq 一致

# 信源参数
# binary（比特+QAM/QPSK）| zc（Zadoff-Chu）；默认 random bits + QPSK，与 GRC QPSK 一致
[source]
type = "binary"
num_bits_per_symbol = 2
cache_file = "out/ofdm_echotimer_dd/transmit"

# OFDM 参数（与 GRC fft_len / transpose_len / subcarrier_spacing / cp 一致）
[ofdm]
num_symbols = 4           # transpose_len
fft_size = 2048           # fft_len
subcarrier_spacing = 60e3 # Hz
cyclic_prefix_length = 512 # fft_len // 4
l_min = 0                 # OFDM 解调器最小时延抽头索引（Sionna OFDMDemodulator）

# 时延/多普勒窗参数
[windows.delay_window]
type = "general_hamming"
alpha = 0.7

[windows.doppler_window]
type = "general_hamming"
alpha = 0.54

# CFAR 参数
[cfar]
type = "ca"
guard = 2
trailing = 20
pfa = 1e-4
detector = "linear"

# MUSIC 参数
[music]
threshold = 0.1

# 时延–多普勒谱 ROI（物理量裁剪）
[dd_spectrum_roi]
max_range_m = 50
max_velocity_mps = 10.0
