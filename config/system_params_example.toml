# =============================================================================
# SystemParams 完整配置示例（对齐 src/isac/data_structures/system_params.py）
#
# 默认可直接解析并通过校验：channel.type = "rt"，须配合 [rt_scene]。
# sensing_performance 无 TOML 字段；载波频率用顶层 carrier_frequency，rg 在构建时注入。
#
# 若改用 channel.type = "rcs"：
#   1. 将 [channel].type 改为 "rcs"
#   2. 注释或删除 [rt_scene] 整段
#   3. 启用文件末尾 [static_target] 注释块中的配置
# =============================================================================

# --- 载波（SystemParams.carrier_frequency）---
carrier_frequency = 6e9 # 载波频率 (Hz)

# --- QAM（SystemParams.qam → mapper / demapper）---
[qam]
num_bits_per_symbol = 2 # QAM 每符号比特数，须为 2 的幂次

# --- OFDM 网格（SystemParams.ofdm → rg / modulator / demodulator）---
[ofdm]
num_symbols = 512            # OFDM 符号数
num_subcarriers = 2048       # FFT 大小 / 子载波数
num_valid_subcarriers = 2048 # 有效子载波数
subcarrier_spacing = 30000.0 # 子载波间隔 (Hz)
cyclic_prefix_length = 512   # 循环前缀长度；别名 num_cyclic_prefix
l_min = -6                   # OFDM 解调器最小时延抽头索引
dc_null = false              # 资源网格是否置空 DC 子载波

# --- 流管理（SystemParams.stream_management → rg_demapper）---
[ofdm.stream_management]
rx_tx_association = [[1]] # 收发关联矩阵
num_streams = 1           # 流数

# --- OFDM 信源（SystemParams.source → zc_source；type=binary 时不构建 ZC）---
[ofdm.source]
type = "zc"      # binary | zc；ZC 须 gcd(root_index, num_data_symbols)=1
root_index = 1
normalize = true

# --- 信道（SystemParams.channel）---
[channel]
type = "rt"   # rt | rcs
snr_db = 10.0 # 接收端 SNR (dB)，apply_channel 时使用

# --- 射线追踪场景（SystemParams.rt_scene；channel.type=rt 时必填）---
[rt_scene]
filename = "simple_reflector" # 场景文件名（assets/rt_scene 下）
merge_shapes = false          # 是否合并相同材质的形状

# 相机参数
[rt_scene.camera]
position = [0, 100, 50] # 相机位置 [x, y, z]
orientation = [0, 0, 0] # 可选：欧拉角 [yaw, pitch, roll]
look_at = [0, 0, 30]    # 可选：注视点

# 天线阵列参数
[rt_scene.antenna_arrays]
# 发射天线阵列参数
[rt_scene.antenna_arrays.tx_array]
type = "PlanarArray"
num_rows = 1
num_cols = 1
vertical_spacing = 0.5
horizontal_spacing = 0.5
pattern = "iso"
polarization = "V"
# 接收天线阵列参数
[rt_scene.antenna_arrays.rx_array]
type = "PlanarArray"
num_rows = 1
num_cols = 1
vertical_spacing = 0.5
horizontal_spacing = 0.5
pattern = "iso"
polarization = "V"

[rt_scene.transceivers]
# 协作拓扑示例：bs1 共址 TX/RX，bs2 仅 TX
[rt_scene.transceivers.bs1]
position = [-25, 0, 30]
look_at = [0, 0, 0]
type = ["tx", "rx"]
power_dbm = 44          # 可选；发射功率 (dBm)

[rt_scene.transceivers.bs2]
position = [25, 0, 30]
look_at = [0, 0, 0]
type = ["tx"]

# 目标材质参数
[rt_scene.target_materials]
# 目标材质参数
[rt_scene.target_materials.car_material]
type = "metal"
thickness = 0.01
color = [0, 0.2, 0.6]

# 目标参数
[rt_scene.targets]
# 目标参数
[rt_scene.targets.car]
fname = "low_poly_car"
material = "car_material"
position = [-5, 0, 0]
velocity = [-10, 0, -30]

# 路径解析器参数
[rt_scene.path_solver]
max_depth = 1
max_num_paths_per_src = 1000000
samples_per_src = 1000000
los = true
specular_reflection = true
diffuse_reflection = true
refraction = false
diffraction = false
edge_diffraction = false
synthetic_array = true
seed = 42

# --- 感知（SystemParams.windows / music / cfar / mti / mtd）---
[sensing]
# 感知窗函数参数
[sensing.windows]
# 延迟窗函数参数
[sensing.windows.delay_window]
# type = "hamming"
type = "general_hamming"
alpha = 0.7
# type = "chebwin"  # 备选窗函数
# at = 45           # chebwin 衰减 (dB)

# 多普勒窗函数参数
[sensing.windows.doppler_window]
# type = "hamming"
type = "general_hamming"
alpha = 0.54
# type = "chebwin"
# at = 45

[sensing.cfar]
type = "ca" # ca | os（os 时须设置 k）
# type = "os"
# k = 24                     # 仅 type=os：有序统计索引
guard = 2
trailing = 20
pfa = 1e-4
detector = "linear" # linear | squarelaw
# offset = 0.0               # 可选：阈值缩放；省略则按 pfa 自动计算

[sensing.music]
threshold = 0.1 # MUSICEstimator.__call__ 默认门限

[sensing.mti]
filter_order = 1 # MTI 脉冲对消阶数
# prf = 30000.0              # 可选；省略则由 rg.ofdm_symbol_duration 推导

[sensing.mtd]
# num_filters = 512          # 可选；省略则等于 num_ofdm_symbols

# =============================================================================
# --- RCS 点目标信道（将 channel.type 改为 rcs 并注释 [rt_scene] 后启用）---
# samp_rate / center_freq 由 apply_phy(carrier_frequency, ofdm) 自动派生，无需手写
#
# [channel]
# type = "rcs"
# snr_db = 10.0
#
# [static_target]
# range_m = 95.0
# velocity_mps = 5.0
# rcs = 1e25
# azimuth_deg = 0.0
# position_rx_m = [0.0]
# self_coupling_db = -10.0
# rndm_phaseshift = true
# self_coupling = true
# =============================================================================
