# =============================================================================
# SystemParams 完整配置示例（对齐 src/isac/data_structures/system_params.py）
#
# 顶层键未出现在 TOML 中 → SystemParams 对应字段为 None → build_from_params 不构建该组件。
# 空段（如仅写 [windows] 无子键）仍算「已配置」，会走段内 from_dict 默认值。
#
# 默认可直接解析并通过校验：channel.type = "rt"，须配合 [rt_simulator]。
# 典型仿真链所需段：
#   - 发射/接收：carrier_frequency, [source], [ofdm]
#   - binary 源须在 [source] 中写 num_bits_per_symbol（见下方注释）
#   - 通信解调：另需 [stream_management]
#   - 信道： [channel] + [rt_simulator] 或 [rcs_scene]
#   - 感知： [mti], [mtd], [windows], [cfar], [music], [dd_spectrum_roi]
#
# 若改用 channel.type = "rcs"：
#   1. 将 [channel].type 改为 "rcs"
#   2. 注释或删除 [rt_simulator] 整段
#   3. 启用文件末尾 [rcs_scene] 注释块中的配置
# =============================================================================

# --- 载波（SystemParams 顶层）---
carrier_frequency = 6e9 # 载波频率 (Hz)

# --- 信源（SystemParams.source；num_bits_per_symbol 仅 type=binary 时配置）---
[source]
type = "zc"      # binary | zc；ZC 须 gcd(root_index, num_data_symbols)=1
root_index = 1
normalize = true
# type = "binary"
# num_bits_per_symbol = 2  # 须为 2 的幂次；代码访问 params.source.num_bits_per_symbol

# --- 流管理（SystemParams.stream_management → rg_demapper）---
[stream_management]
rx_tx_association = [[1]] # 收发关联矩阵
num_streams = 1           # 流数

# --- OFDM 网格（SystemParams.ofdm → rg / modulator / demodulator）---
[ofdm]
num_symbols = 512            # OFDM 符号数
fft_size = 2048              # FFT 大小
subcarrier_spacing = 30000.0 # 子载波间隔 (Hz)
cyclic_prefix_length = 512   # 循环前缀长度
l_min = -6                   # OFDM 解调器最小时延抽头索引
dc_null = false              # 资源网格是否置空 DC 子载波

# --- 信道（SystemParams.channel）---
[channel]
type = "rt"   # rt | rcs
snr_db = 10.0 # 接收端 SNR (dB)，components.channel 时使用

# --- 射线追踪场景（SystemParams.rt_simulator；channel.type=rt 时必填）---
[rt_simulator]
filename = "simple_reflector" # 场景文件名（isac/channel/rt/scenes 下，或 Sionna 内置名）
merge_shapes = false          # 是否合并相同材质的形状

# 场景过滤器参数
[rt_simulator.scene_filter]
safe_margin = 1.0             # 障碍物 AABB 各轴外扩距离 (m)

# 相机参数
[rt_simulator.camera]
position = [0, 100, 50] # 相机位置 [x, y, z]
orientation = [0, 0, 0] # 可选：欧拉角 [yaw, pitch, roll]
look_at = [0, 0, 30]    # 可选：注视点

# 天线阵列参数
[rt_simulator.antenna_arrays]
# 发射天线阵列参数
[rt_simulator.antenna_arrays.tx_array]
num_rows = 1
num_cols = 1
vertical_spacing = 0.5
horizontal_spacing = 0.5
pattern = "iso"
polarization = "V"
# 接收天线阵列参数
[rt_simulator.antenna_arrays.rx_array]
num_rows = 1
num_cols = 1
vertical_spacing = 0.5
horizontal_spacing = 0.5
pattern = "iso"
polarization = "V"

[rt_simulator.transceivers]
# 协作拓扑示例：bs1 共址 TX/RX，bs2 仅 TX
[rt_simulator.transceivers.bs1]
position = [-25, 0, 30]
look_at = [0, 0, 0]
type = ["tx", "rx"]
power_dbm = 44          # 可选；发射功率 (dBm)

[rt_simulator.transceivers.bs2]
position = [25, 0, 30]
look_at = [0, 0, 0]
type = ["tx"]

# 目标材质参数
[rt_simulator.target_materials]
[rt_simulator.target_materials.car_material]
type = "metal"
thickness = 0.01
color = [0, 0.2, 0.6]

# 目标参数
[rt_simulator.targets]
[rt_simulator.targets.car]
fname = "low_poly_car"
material = "car_material"
position = [-5, 0, 0]
velocity = [-10, 0, -30]

# 路径解析器参数
[rt_simulator.path_solver]
max_depth = 1
max_num_paths_per_src = 1000000
samples_per_src = 1000000
los = true
specular_reflection = true
diffuse_reflection = true
refraction = false
diffraction = false
edge_diffraction = false
synthetic_array = true
seed = 42

# --- 感知（SystemParams.mti / mtd / windows / cfar / music）---
# --- MTI（SystemParams.mti）---
[mti]
filter_order = 1 # MTI 脉冲对消阶数
# prf = 30000.0              # 可选；省略则由 rg.ofdm_symbol_duration 推导

# --- MTD（SystemParams.mtd）---
[mtd]
# num_filters = 512          # 可选；省略则等于 num_ofdm_symbols

# --- 时延/多普勒窗（SystemParams.windows）---
[windows]
# 延迟窗函数参数
[windows.delay_window]
# type = "hamming"
type = "general_hamming"
alpha = 0.7
# type = "chebwin"  # 备选窗函数
# at = 45           # chebwin 衰减 (dB)

# 多普勒窗函数参数
[windows.doppler_window]
# type = "hamming"
type = "general_hamming"
alpha = 0.54
# type = "chebwin"
# at = 45

# --- CFAR（SystemParams.cfar）---
[cfar]
type = "ca" # ca | os（os 时须设置 k）
# type = "os"
# k = 24                     # 仅 type=os：有序统计索引
guard = 2
trailing = 20
pfa = 1e-4
detector = "linear" # linear | squarelaw
# offset = 0.0               # 可选：阈值缩放；省略则按 pfa 自动计算

# --- MUSIC（SystemParams.music）---
[music]
threshold = 0.1          # MUSICEstimator.__call__ 默认门限
near_range_guard_m = 1.0 # 跳过近距直达波/泄漏的物理距离 (m)

# --- 时延–多普勒谱 ROI（SystemParams.dd_spectrum_roi）---
[dd_spectrum_roi]
max_range_m = 310.0       # 时延轴裁剪上界 (m)，从 0 起
max_velocity_mps = 150.0  # 多普勒轴半幅 (m/s)，零多普勒中心 ±

# =============================================================================
# --- RCS 点目标信道（将 channel.type 改为 rcs 并注释 [rt_simulator] 后启用）---
# samp_rate / center_freq 在 RCSChannel 构建时由 ofdm.samp_rate 与 carrier_frequency 注入
#
# [channel]
# type = "rcs"
# snr_db = 10.0
#
# [rcs_scene]
# self_coupling_db = -10.0
# rndm_phaseshift = true
# self_coupling = true
#
# [rcs_scene.target]
# range_m = 95.0
# velocity_mps = 5.0
# rcs = 1e25
# azimuth_deg = 0.0
# position_rx_m = 0.0
# =============================================================================
