id: sionna_static_target
label: Sionna Static Target
category: '[Sionna]'
flags: [python]

parameters:
- id: range
  label: Range [m]
  dtype: real
  default: '100'
- id: velocity
  label: Velocity [m/s]
  dtype: real
  default: '5'
- id: rcs
  label: RCS
  dtype: real
  default: 1e25
- id: azimuth
  label: Azimuth [deg]
  dtype: real
  default: '0'
- id: position_rx
  label: Position RX [m]
  dtype: real_vector
  default: 0,
- id: samp_rate
  label: Sample rate [Hz]
  dtype: int
  default: '30720000'
- id: center_freq
  label: Center frequency [Hz]
  dtype: real
  default: 6e9
- id: self_coupling_db
  label: Self coupling [dB]
  dtype: real
  default: '-10'
- id: rndm_phaseshift
  label: Random phase shift
  dtype: bool
  default: 'True'
  options: ['True', 'False']
- id: self_coupling
  label: Self coupling
  dtype: bool
  default: 'True'
  options: ['True', 'False']
- id: length_tag_key
  label: Packet length key
  dtype: string
  default: '"packet_len"'
- id: device
  label: Device
  dtype: string
  default: '"cuda:0"'
- id: fft_len
  label: FFT length
  dtype: int
  default: '2048'
- id: ofdm_symbols
  label: OFDM symbols
  dtype: int
  default: '512'
- id: cp_len
  label: CP length
  dtype: int
  default: '512'
- id: burst_mode
  label: Burst mode
  dtype: bool
  default: 'False'
  options: ['True', 'False']
  option_labels: ['Enabled', 'Disabled']
- id: minoutbuf
  label: Min output buffer
  dtype: int
  default: '0'
  hide: part

inputs:
- domain: stream
  dtype: complex

outputs:
- domain: stream
  dtype: complex

templates:
  imports: from sionna_static_target import SionnaStaticTarget
  make: SionnaStaticTarget(range_m=${range}, velocity_mps=${velocity}, rcs=${rcs}, azimuth_deg=${azimuth}, position_rx_m=${position_rx}, samp_rate=${samp_rate}, center_freq=${center_freq}, self_coupling_db=${self_coupling_db}, rndm_phaseshift=${rndm_phaseshift}, self_coupling=${self_coupling}, length_tag_key=${length_tag_key}, device=${device}, fft_len=${fft_len}, ofdm_symbols=${ofdm_symbols}, cp_len=${cp_len}, burst_mode=${burst_mode})
  callbacks:
  - setup_targets(${range}, ${velocity}, ${rcs}, ${azimuth}, ${position_rx}, ${samp_rate}, ${center_freq}, ${self_coupling_db}, ${rndm_phaseshift}, ${self_coupling})
  - set_min_output_buffer(${minoutbuf})

file_format: 1
