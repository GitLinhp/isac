carrier_frequency = 6e9 # 载波频率(Hz)

# 信源参数
# binary（比特+QAM）| zc（Zadoff-Chu）；ZC 须 gcd(root_index, num_data_symbols)=1
[source]
type = "zc"
root_index = 1
normalize = true
num_bits_per_symbol = 2

# OFDM 参数
[ofdm]
num_symbols = 512          # 符号数
fft_size = 2048            # FFT 大小
subcarrier_spacing = 30e3  # 子载波间隔(Hz)
cyclic_prefix_length = 512 # 循环前缀长度
l_min = -6                 # OFDM 解调器最小时延抽头索引（Sionna OFDMDemodulator）

# 信道参数
[channel]
type = "rt"
snr_db = 10 # 信噪比(dB)

# 射线追踪场景参数
[rt_simulator]
filename = "empty_room"
merge_shapes = false    # 是否合并相同材质的形状

# 相机参数
[rt_simulator.camera]
position = [-3, 0, 20] # 相机位置
look_at = [0, 0, 0]    # 相机朝向

# 场景过滤器参数
[rt_simulator.scene_filter]
safe_margin = 0.3

# 场景渲染参数
[rt_simulator.render]
clip_at = 3.4

# 天线阵列参数
[rt_simulator.antenna_arrays]
# 发射天线阵列参数
[rt_simulator.antenna_arrays.tx_array]
num_rows = 1
num_cols = 1
vertical_spacing = 0.5
horizontal_spacing = 0.5
pattern = "iso"
polarization = "V"
# 接收天线阵列参数
[rt_simulator.antenna_arrays.rx_array]
num_rows = 1
num_cols = 1
vertical_spacing = 0.5
horizontal_spacing = 0.5
pattern = "iso"
polarization = "V"

# 收发机参数
[rt_simulator.transceivers]
[rt_simulator.transceivers.bs1]
position = [-4.5, -2.5, 1.5]
look_at = [0, 0, 0]
type = ["tx", "rx"]
power_dbm = 44               # 发射功率 (dBm)，对应 Sionna RT Transmitter
# [rt_simulator.transceivers.bs2]
# position = [40, 0, 20]
# look_at = [0, 0, 0]
# type = ["tx", "rx"]

# 目标材质参数
[rt_simulator.target_materials]
# [rt_simulator.target_materials.cube_material]
# type = "metal"
# thickness = 0.01
# color = [0, 0.2, 0.6]

[rt_simulator.target_materials.sphere_material]
type = "metal"
thickness = 0.01
color = [0, 0.2, 0.6]

# 目标参数
[rt_simulator.targets]
# [rt_simulator.targets.cube]
# fname = "cube"
# material = "cube_material"
# position = [0, 0, 0]
# velocity = [0, 0, 0]
# orientation = [0, 0, 0]
# # scaling = [0.6, 0.6, 0.6]
# scaling = [1, 1, 1]

[rt_simulator.targets.sphere]
fname = "sphere"
material = "sphere_material"
position = [0, 0, 0.5]
velocity = [0, 0, 0]
orientation = [0, 0, 0]
scaling = [0.5, 0.5, 0.5]

# 路径解析器参数
[rt_simulator.path_solver]
max_depth = 3               # 最大路径交互次数
max_num_paths_per_src = 1e6 # 每个信号源的最大路径数
samples_per_src = 1e6       # 每个信号源的射线采样数
los = false                 # 是否考虑LOS路径
specular_reflection = true  # 是否考虑镜面反射
diffuse_reflection = false  # 是否考虑漫反射
refraction = true           # 是否考虑折射
diffraction = true          # 是否考虑衍射
edge_diffraction = false    # 是否考虑边缘衍射
synthetic_array = true      # 是否使用合成阵列
seed = 42                   # 随机种子

[mti]
filter_order = 1 # MTI 脉冲对消阶数

# 时延/多普勒窗参数（可选）：整段注释或子键缺省时不加窗（矩形窗）
# [windows.delay_window]
# type = "general_hamming"
# alpha = 0.9

[windows.doppler_window]
type = "chebwin"
at = 45

# CFAR 参数（2D，用于 ROI 裁切 DD 谱；当前 ROI 约 8×13 bin）
[cfar]
type = "ca" # ca: CA-CFAR | os: OS-CFAR（二维实现见 sensing/cfar.py）
# k = 24               # 仅 type=os 时需要：有序统计索引
# 分轴 guard/trailing：[多普勒, 时延]；窗长 = (g+t)*2+1 → 本配置 7×11，适配小 ROI
guard = [1, 1]      # 保护单元（分轴）
trailing = [2, 4]   # 参考单元（分轴）
pfa = 1e-4          # 虚警率
detector = "linear" # 检测器: linear（|h_dd|）| squarelaw（|h_dd|²）
# offset = 0.0         # 阈值缩放；不设置则按 pfa 自动计算

# MUSIC 参数
[music]
threshold = 0.1

# 时延–多普勒谱 ROI（物理量裁剪）；注释掉本节则采集/回放使用全谱 (num_symbols × fft_size)
[dd_spectrum_roi]
max_range_m = 30.0
max_velocity_mps = 5.0
